name: Build and Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 本番デプロイの競合を防ぐ。PRはrefごとに分離する。
concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_BASE: /
          VITE_ADSENSE_CLIENT: ${{ vars.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT: ${{ vars.VITE_ADSENSE_SLOT }}
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
